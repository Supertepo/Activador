<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTech Optimizador | Oficial</title>
    <style>
        :root {
            --primary: #0078d4;
            --dark: #0a0a0a;
            --secondary: #1f1f1f;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--secondary);
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .btn-download {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 18px 40px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-download:hover {
            background: #008aff;
            box-shadow: 0 0 20px rgba(0, 120, 212, 0.6);
        }

        .file-info {
            margin-top: 15px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="margin-bottom: 5px;">WinTech v4.0</h1>
        <p style="color: #888; margin-bottom: 30px;">Paquete de herramientas y documentación oficial.</p>
        
        <a href="protector.exe" class="btn-download" download>
            DESCARGAR ACTIVADOR
        </a>

        <div class="file-info">
            Verificado por Microsoft Defender | 15.4 KB
        </div>
    </div>

</body>
</html>
